<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70">
  <!-- D (left) -->
  <text x="4" y="54"
        font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
        font-weight="900"
        font-size="62"
        fill="#FFFFFF">D</text>
  <!-- A (gold) -->
  <text x="90" y="54"
        font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
        font-weight="900"
        font-size="62"
        fill="#EDB800">A</text>
  <!-- D (right) -->
  <text x="176" y="54"
        font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
        font-weight="900"
        font-size="62"
        fill="#FFFFFF">D</text>
  <!-- Tagline — textLength locks it inside the D's, lengthAdjust spreads spacing evenly -->
  <text x="4" y="67"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="6.2"
        font-weight="700"
        fill="#EDB800"
        textLength="218"
        lengthAdjust="spacing">REPAIR DAD  •  KNOW HOW DAD  •  COMMUNITY DAD</text>
</svg>
